<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>VocabVault</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#0b0b0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VocabVault">
<style>
  :root{
    --bg:#0b0b0f; --surface:#15151b; --surface2:#1c1c24; --border:#2a2a33;
    --text:#f2f0ea; --muted:#8b8b96; --accent:#ff7a3d;
    --font-head: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, "Courier New", monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--font-head); overscroll-behavior:none;}
  body{
    background-color:var(--bg);
    background-image:radial-gradient(circle, #23232c 1px, transparent 1px);
    background-size:22px 22px;
    min-height:100vh;
  }
  button{font-family:inherit; cursor:pointer; border:none;}
  input,textarea{font-family:inherit; outline:none;}
  .btn{
    padding:10px 16px; border-radius:10px; font-size:14px; font-weight:600;
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    transition:transform .1s;
  }
  .btn:active{transform:scale(.96);}
  .btn-solid{background:var(--accent); color:#1a0f08;}
  .btn-outline{background:transparent; color:var(--text); border:1px solid var(--border);}
  .btn-ghost{background:transparent; color:var(--muted);}
  .btn[disabled]{opacity:.35; pointer-events:none;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:11px; color:var(--muted); font-family:var(--font-mono); margin-bottom:4px;}
  .field input, .field textarea{
    width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:10px 12px; font-size:15px;
  }
  .field textarea{resize:none;}
  .topbar{position:sticky; top:0; z-index:5; padding:16px 16px 12px; background:linear-gradient(var(--bg) 80%, transparent);}
  .row{display:flex; align-items:center; gap:8px;}
  .between{justify-content:space-between;}
  .pill{font-size:11px; padding:4px 10px; border-radius:999px; font-family:var(--font-mono);}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px 100px;}
  .list-card{
    background:var(--surface); border-radius:16px; padding:16px; text-align:left;
    display:flex; flex-direction:column; gap:8px; color:var(--text); position:relative;
  }
  .list-card-delete{
    position:absolute; top:10px; right:10px; background:none; color:var(--muted);
    padding:4px; display:flex; z-index:2; cursor:pointer; font-size:15px;
  }
  .dot{width:8px; height:8px; border-radius:50%;}
  .fab{
    position:fixed; bottom:24px; right:20px; width:56px; height:56px; border-radius:50%;
    background:var(--accent); color:#1a0f08; display:flex; align-items:center; justify-content:center;
    font-size:26px; box-shadow:0 6px 24px -6px rgba(255,122,61,.7); z-index:10;
  }
  .empty{color:var(--muted); text-align:center; margin-top:60px; font-size:14px; padding:0 24px;}
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
  }
  @media(min-width:640px){ .modal-backdrop{align-items:center;} }
  .modal{
    width:100%; max-width:420px; background:var(--surface); border:1px solid var(--border);
    border-radius:20px 20px 0 0; padding:20px; max-height:88vh; overflow-y:auto;
  }
  @media(min-width:640px){ .modal{border-radius:20px;} }
  .card-wrap{max-width:380px; margin:0 auto; perspective:1200px;}
  .flashcard{
    position:relative; width:100%; height:320px; transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.4,.2,.2,1); cursor:pointer;
  }
  .flashcard.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute; inset:0; border-radius:20px; padding:22px; display:flex; flex-direction:column;
    backface-visibility:hidden; -webkit-backface-visibility:hidden;
  }
  .face.back{transform:rotateY(180deg);}
  .face-word{flex:1; display:flex; align-items:center; justify-content:center; text-align:center; font-size:28px; font-weight:700; word-break:break-word;}
  .face-note{color:var(--muted); font-family:var(--font-mono); font-size:12px; text-align:center; margin-top:6px; padding:0 8px;}
  .face-hint{text-align:center; color:var(--muted); font-family:var(--font-mono); font-size:11px;}
  .chip-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;}
  .study-controls{display:flex; justify-content:center; gap:10px; margin-top:20px;}
  .progress{text-align:center; color:var(--muted); font-family:var(--font-mono); font-size:12px; margin-top:10px;}
  .tabs{display:flex; gap:8px; margin-top:12px;}
  .tabs .btn{flex:1;}
  .filters{display:flex; gap:8px; padding:0 16px 12px; overflow-x:auto;}
  .filter-chip{font-size:12px; padding:6px 12px; border-radius:999px; font-family:var(--font-mono); white-space:nowrap; background:var(--surface2); color:var(--muted);}
  .filter-chip.active{background:var(--accent); color:#1a0f08;}
  .manage-list{display:flex; flex-direction:column; gap:8px; padding:0 16px 100px;}
  .manage-item{
    background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:12px;
    display:flex; align-items:center; gap:10px;
  }
  .manage-text{flex:1; min-width:0;}
  .manage-text .w{font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .manage-text .n{color:var(--muted); font-family:var(--font-mono); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .icon-btn{background:none; padding:4px; display:flex; color:var(--muted);}
  .icon-btn.on{color:var(--accent);}
  h1{font-size:24px; margin:0;}
  h1 span{color:var(--accent);}
  h2{font-size:20px; margin:0 0 2px;}
  .settings-actions{display:flex; flex-direction:column; gap:10px; margin-top:8px;}
  .toast{position:fixed; top:14px; left:50%; transform:translateX(-50%); background:var(--surface2); color:var(--muted);
    font-family:var(--font-mono); font-size:12px; padding:8px 14px; border-radius:999px; z-index:100; border:1px solid var(--border);}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------- data ---------- */
const STORAGE_KEY = "vocabvault-data-v1";
const PALETTE = ["#ff7a3d","#3ddc97","#5fb4ff","#e05fff","#ffd166","#ff5f7e","#7dd3fc","#c4b5fd"];

function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }
function colorFor(id){ let h=0; for(const c of id) h=(h*31+c.charCodeAt(0))>>>0; return PALETTE[h % PALETTE.length]; }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ return (s||"").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return { lists: [] };
    const parsed = JSON.parse(raw);
    return { lists: parsed.lists || [] };
  }catch(e){ return { lists: [] }; }
}
function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ lists: state.lists }));
}

/* ---------- state ---------- */
let state = {
  ...loadData(),
  screen: "home",       // home | list
  currentListId: null,
  mode: "study",         // study | manage
  filter: "active",      // active | important | archived
  order: [], pos: 0, flipped: false,
  modal: null,           // {type:'addList'} | {type:'addCard'} | {type:'editCard', card} | {type:'settings'}
};

function currentList(){ return state.lists.find(l => l.id === state.currentListId); }

function toast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 1800);
}
function askConfirm(message, onConfirm){
  state.modal = { type: "confirm", message, onConfirm };
  render();
}
function runConfirmedAction(){
  const modal = state.modal;
  state.modal = null;
  if(modal && modal.onConfirm) modal.onConfirm();
  render();
}

/* ---------- mutations ---------- */
function addList(name, fromLabel, toLabel){
  state.lists.push({ id: uid(), name, fromLabel, toLabel, direction: "source", cards: [] });
  saveData(); state.modal = null; render();
}
function updateCurrentList(mutator){
  const list = currentList();
  mutator(list);
  saveData(); render();
}
function toggleDirection(){
  updateCurrentList(l => l.direction = (l.direction === "source" ? "target" : "source"));
}
function addCard(source, target, note, important){
  updateCurrentList(l => l.cards.push({ id: uid(), source, target, note, important, archived:false }));
  reshuffle();
  state.modal = null; render();
}
function editCard(id, source, target, note, important){
  updateCurrentList(l => {
    const c = l.cards.find(c => c.id === id);
    Object.assign(c, { source, target, note, important });
  });
  state.modal = null; render();
}
function toggleImportant(id){
  updateCurrentList(l => { const c=l.cards.find(c=>c.id===id); c.important=!c.important; });
}
function toggleArchive(id){
  updateCurrentList(l => { const c=l.cards.find(c=>c.id===id); c.archived=!c.archived; });
  reshuffle();
}
function deleteCard(id){
  updateCurrentList(l => { l.cards = l.cards.filter(c=>c.id!==id); });
}
function deleteList(){
  askConfirm("Diese Liste inkl. aller Vokabeln endgültig löschen?", () => {
    state.lists = state.lists.filter(l => l.id !== state.currentListId);
    saveData(); state.screen="home"; state.currentListId=null; render();
  });
}

/* ---------- study logic ---------- */
function reshuffle(){
  const list = currentList();
  if(!list) return;
  const active = list.cards.filter(c=>!c.archived);
  state.order = shuffle(active.map(c=>c.id));
  state.pos = 0; state.flipped = false;
}
function nextCard(){
  state.flipped = false;
  if(state.pos+1 >= state.order.length) reshuffle();
  else state.pos++;
  render();
}

/* ---------- export / import (manual backup, no cloud) ---------- */
function exportData(){
  const blob = new Blob([JSON.stringify({lists: state.lists}, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "vocabvault-backup-" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
  URL.revokeObjectURL(url);
}
function importData(file){
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed.lists) throw new Error("no lists");
      askConfirm("Import überschreibt alle aktuellen Listen auf diesem Gerät. Fortfahren?", () => {
        state.lists = parsed.lists;
        saveData(); state.screen="home"; render();
        toast("Import erfolgreich");
      });
    }catch(e){ toast("Datei ungültig"); }
  };
  reader.readAsText(file);
}

/* ---------- rendering ---------- */
function render(){
  document.querySelectorAll(".modal-backdrop").forEach(el => el.remove());
  const app = document.getElementById("app");
  app.innerHTML = state.screen === "home" ? renderHome() : renderListScreen();
  if(state.modal) renderModal();
}

function renderHome(){
  const cards = state.lists.map(l => {
    const c = colorFor(l.id);
    const activeCount = l.cards.filter(c=>!c.archived).length;
    return `
      <button class="list-card" style="border:1px solid ${c}44; box-shadow:0 0 30px -14px ${c}66" onclick="openList('${l.id}')">
        <div class="dot" style="background:${c}"></div>
        <div style="font-weight:600; font-size:14px;">${esc(l.name)}</div>
        <div style="color:var(--muted); font-family:var(--font-mono); font-size:12px;">${activeCount} Karten</div>
      </button>`;
  }).join("");

  return `
    <div class="topbar row between">
      <h1>Vocab<span>Vault</span></h1>
      <div class="row" style="gap:14px;">
        <button class="icon-btn" onclick="openDeleteListMenu()" style="font-size:20px;">&#128465;&#65039;</button>
        <button class="icon-btn" onclick="openSettings()" style="font-size:20px;">&#9881;&#65039;</button>
      </div>
    </div>
    ${state.lists.length===0 ? `<p class="empty">Noch keine Liste. Leg deine erste Vokabelliste an — unten rechts.</p>` : `<div class="grid">${cards}</div>`}
    <button class="fab" onclick="openAddList()">+</button>
  `;
}

function renderListScreen(){
  const list = currentList();
  if(!list){ state.screen="home"; return renderHome(); }
  const accent = colorFor(list.id);
  const dirLabel = list.direction === "source" ? `${esc(list.fromLabel)} → ${esc(list.toLabel)}` : `${esc(list.toLabel)} → ${esc(list.fromLabel)}`;

  let body = "";
  if(state.mode === "study"){
    const active = list.cards.filter(c=>!c.archived);
    if(active.length === 0){
      body = `<p class="empty">Keine aktiven Vokabeln. Füg welche über „Verwalten" hinzu.</p>`;
    } else {
      const currentId = state.order[state.pos];
      const card = list.cards.find(c=>c.id===currentId);
      if(card){
        const front = list.direction==="source" ? card.source : card.target;
        const back = list.direction==="source" ? card.target : card.source;
        body = `
          <div style="padding:16px;">
            <div class="card-wrap">
              <div class="flashcard ${state.flipped?'flipped':''}" onclick="flipCard()">
                <div class="face" style="background:var(--surface); border:1px solid ${accent}55; box-shadow:0 0 40px -12px ${accent}55;">
                  ${chrome(accent, list.name, card.important)}
                  <div class="face-word">${esc(front)}</div>
                  <div class="face-hint">tippen zum Umdrehen</div>
                </div>
                <div class="face back" style="background:var(--surface2); border:1px solid ${accent}55; box-shadow:0 0 40px -12px ${accent}55;">
                  ${chrome(accent, list.name, card.important)}
                  <div class="face-word">${esc(back)}</div>
                  ${card.note ? `<div class="face-note">${esc(card.note)}</div>` : ""}
                  <div class="face-hint">tippen zum Umdrehen</div>
                </div>
              </div>
            </div>
            <div class="study-controls">
              <button class="btn btn-outline icon-btn ${card.important?'on':''}" onclick="toggleImportant('${card.id}')">${card.important?'&#9733;':'&#9734;'}</button>
              <button class="btn btn-outline" onclick="toggleArchive('${card.id}')">&#128465;&#65039;</button>
              <button class="btn btn-solid" onclick="nextCard()">Weiter &#8635;</button>
            </div>
            <div class="progress">${state.pos+1} / ${state.order.length}</div>
          </div>`;
      }
    }
  } else {
    const filtered = list.cards.filter(c => state.filter==="active" ? !c.archived : state.filter==="important" ? (c.important && !c.archived) : c.archived);
    body = `
      <div class="filters">
        ${["active","important","archived"].map(f => `
          <button class="filter-chip ${state.filter===f?'active':''}" onclick="setFilter('${f}')">${f==="active"?"Aktiv":f==="important"?"Wichtig":"Ausgeblendet"}</button>
        `).join("")}
      </div>
      <div class="manage-list">
        ${filtered.length===0 ? `<p class="empty">Keine Vokabeln in dieser Ansicht.</p>` : filtered.map(c => `
          <div class="manage-item">
            <div class="manage-text">
              <div class="w">${esc(c.source)} — ${esc(c.target)}</div>
              ${c.note ? `<div class="n">${esc(c.note)}</div>` : ""}
            </div>
            <button class="icon-btn ${c.important?'on':''}" onclick="toggleImportant('${c.id}')">${c.important?'&#9733;':'&#9734;'}</button>
            <button class="icon-btn" onclick="openEditCard('${c.id}')">&#9998;&#65039;</button>
            <button class="icon-btn" onclick="toggleArchive('${c.id}')">${c.archived?'&#8617;&#65039;':'&#128465;&#65039;'}</button>
            ${c.archived ? `<button class="icon-btn" onclick="confirmDeleteCard('${c.id}')">&#128465;</button>` : ""}
          </div>
        `).join("")}
      </div>
      <div style="padding:0 16px 100px;">
        <button class="btn btn-solid" style="width:100%;" onclick="openAddCard()">+ Neue Vokabel</button>
      </div>
    `;
  }

  return `
    <div class="topbar">
      <div class="row between" style="margin-bottom:10px;">
        <button class="icon-btn" onclick="backHome()">&#8592; Listen</button>
        <button class="pill" style="background:${accent}1a; color:${accent}; border:none;" onclick="toggleDirection()">&#8646; ${dirLabel}</button>
      </div>
      <h2>${esc(list.name)}</h2>
      <div class="tabs">
        <button class="btn ${state.mode==='study'?'btn-solid':'btn-outline'}" onclick="setMode('study')">Lernen</button>
        <button class="btn ${state.mode==='manage'?'btn-solid':'btn-outline'}" onclick="setMode('manage')">Verwalten</button>
      </div>
    </div>
    ${body}
  `;
}

function chrome(accent, listName, important){
  return `
    <div class="chip-row">
      <span class="pill" style="background:${accent}22; color:${accent};">${esc(listName)}</span>
      ${important ? `<span style="color:${accent}; font-size:16px;">&#9733;</span>` : ""}
    </div>`;
}

function renderModal(){
  const m = state.modal;
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.onclick = (e) => { if(e.target===backdrop){ state.modal=null; render(); } };

  let inner = "";
  if(m.type === "addList"){
    inner = `
      <div class="row between" style="margin-bottom:16px;"><h2>Neue Liste</h2><button class="icon-btn" onclick="closeModal()">&#10005;</button></div>
      <div class="field"><label>Name der Liste</label><input id="f-name" placeholder="z.B. Spanisch – Grundwortschatz"></div>
      <div class="field"><label>Sprache A</label><input id="f-from" placeholder="z.B. Spanisch"></div>
      <div class="field"><label>Sprache B</label><input id="f-to" placeholder="z.B. Deutsch"></div>
      <button class="btn btn-solid" style="width:100%;" onclick="submitAddList()">Liste erstellen</button>
    `;
  } else if(m.type === "addCard" || m.type === "editCard"){
    const c = m.card || {source:"",target:"",note:"",important:false};
    const list = currentList();
    inner = `
      <div class="row between" style="margin-bottom:16px;"><h2>${m.type==='editCard'?'Vokabel bearbeiten':'Neue Vokabel'}</h2><button class="icon-btn" onclick="closeModal()">&#10005;</button></div>
      <div class="field"><label>${esc(list.fromLabel)}</label><input id="f-source" value="${esc(c.source)}" placeholder="z.B. la mesa"></div>
      <div class="field"><label>${esc(list.toLabel)}</label><input id="f-target" value="${esc(c.target)}" placeholder="z.B. der Tisch"></div>
      <div class="field"><label>Anmerkung (optional)</label><textarea id="f-note" rows="3" placeholder="z.B. unregelmäßiges Verb">${esc(c.note)}</textarea></div>
      <button class="row" id="f-important-btn" onclick="toggleImportantField()" style="background:none; color:${c.important?'var(--accent)':'var(--muted)'}; margin-bottom:16px; font-size:14px;">
        <span id="f-important-star">${c.important?'&#9733;':'&#9734;'}</span> Als wichtig markieren
      </button>
      <input type="hidden" id="f-important" value="${c.important?'1':'0'}">
      <button class="btn btn-solid" style="width:100%;" onclick="${m.type==='editCard' ? `submitEditCard('${c.id}')` : 'submitAddCard()'}">Speichern</button>
    `;
  } else if(m.type === "settings"){
    inner = `
      <div class="row between" style="margin-bottom:16px;"><h2>Einstellungen</h2><button class="icon-btn" onclick="closeModal()">&#10005;</button></div>
      <p style="color:var(--muted); font-size:13px; margin-bottom:16px;">Alle Daten liegen nur lokal in diesem Browser (localStorage). Es gibt keinen automatischen Sync zwischen Geräten. Nutze Export/Import, um ein Backup zu machen oder Daten manuell auf ein anderes Gerät zu übertragen.</p>
      <div class="settings-actions">
        <button class="btn btn-outline" style="width:100%;" onclick="exportData()">Backup exportieren (JSON)</button>
        <label class="btn btn-outline" style="width:100%; display:flex;">
          Backup importieren (JSON)
          <input type="file" accept="application/json" style="display:none;" onchange="importData(this.files[0])">
        </label>
        ${state.currentListId ? `<button class="btn btn-outline" style="width:100%; color:#ff5f7e;" onclick="deleteList()">Diese Liste löschen</button>` : ""}
      </div>
    `;
  } else if(m.type === "deleteListMenu"){
    inner = `
      <div class="row between" style="margin-bottom:16px;"><h2>Liste löschen</h2><button class="icon-btn" onclick="closeModal()">&#10005;</button></div>
      ${state.lists.length===0 ? `<p style="color:var(--muted); font-size:14px;">Keine Listen vorhanden.</p>` : `
        <div style="display:flex; flex-direction:column; gap:8px;">
          ${state.lists.map(l => `
            <button class="btn btn-outline" style="width:100%; justify-content:space-between; color:#ff5f7e;" onclick="confirmDeleteList('${l.id}')">
              <span>${esc(l.name)}</span>
              <span>&#128465;&#65039;</span>
            </button>`).join("")}
        </div>
      `}
    `;
  } else if(m.type === "confirm"){
    inner = `
      <h2 style="margin-bottom:10px;">Bestätigen</h2>
      <p style="color:var(--muted); font-size:14px; margin-bottom:20px;">${esc(m.message)}</p>
      <div class="row" style="gap:10px;">
        <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">Abbrechen</button>
        <button class="btn btn-solid" style="flex:1; background:#ff5f7e; color:#1a0f08;" onclick="runConfirmedAction()">Löschen</button>
      </div>
    `;
  }

  backdrop.innerHTML = `<div class="modal">${inner}</div>`;
  document.body.appendChild(backdrop);
  const first = backdrop.querySelector("input, textarea");
  if(first) first.focus();
}

/* ---------- event handlers (global) ---------- */
function openList(id){ state.currentListId=id; state.screen="list"; state.mode="study"; state.filter="active"; reshuffle(); render(); }
function backHome(){ state.screen="home"; state.currentListId=null; render(); }
function setMode(m){ state.mode=m; if(m==='study') reshuffle(); render(); }
function setFilter(f){ state.filter=f; render(); }
function flipCard(){ state.flipped=!state.flipped; render(); }
function openAddList(){ state.modal={type:'addList'}; render(); }
function openAddCard(){ state.modal={type:'addCard'}; render(); }
function openEditCard(id){ const c = currentList().cards.find(c=>c.id===id); state.modal={type:'editCard', card:c}; render(); }
function openSettings(){ state.modal={type:'settings'}; render(); }
function openDeleteListMenu(){ state.modal={type:'deleteListMenu'}; render(); }
function closeModal(){ state.modal=null; render(); }
function confirmDeleteCard(id){ askConfirm("Vokabel endgültig löschen?", () => deleteCard(id)); }
function confirmDeleteList(id){
  const list = state.lists.find(l => l.id === id);
  if(!list) return;
  askConfirm(`Liste "${list.name}" inkl. aller Vokabeln endgültig löschen?`, () => {
    state.lists = state.lists.filter(l => l.id !== id);
    saveData();
    state.modal = null;
    if(state.lists.length === 0){ state.screen = "home"; state.currentListId = null; }
    render();
  });
}

function toggleImportantField(){
  const input = document.getElementById("f-important");
  const star = document.getElementById("f-important-star");
  const btn = document.getElementById("f-important-btn");
  const on = input.value === "1";
  input.value = on ? "0" : "1";
  star.innerHTML = on ? "&#9734;" : "&#9733;";
  btn.style.color = on ? "var(--muted)" : "var(--accent)";
}
function submitAddList(){
  const name = document.getElementById("f-name").value.trim();
  const from = document.getElementById("f-from").value.trim();
  const to = document.getElementById("f-to").value.trim();
  if(!name || !from || !to) return;
  addList(name, from, to);
}
function submitAddCard(){
  const source = document.getElementById("f-source").value.trim();
  const target = document.getElementById("f-target").value.trim();
  const note = document.getElementById("f-note").value.trim();
  const important = document.getElementById("f-important").value === "1";
  if(!source || !target) return;
  addCard(source, target, note, important);
}
function submitEditCard(id){
  const source = document.getElementById("f-source").value.trim();
  const target = document.getElementById("f-target").value.trim();
  const note = document.getElementById("f-note").value.trim();
  const important = document.getElementById("f-important").value === "1";
  if(!source || !target) return;
  editCard(id, source, target, note, important);
}

render();
</script>
